name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # GITHUB_REPOSITORY is a built-in env var ("owner/repo"). For a project
      # Pages site served from /<repo>/, the Vite base must match. If you deploy
      # to a custom domain or a user/org page (served from "/"), set VITE_BASE=/.
      - name: Build
        run: |
          export VITE_BASE="/${GITHUB_REPOSITORY#*/}/"
          echo "Building with base $VITE_BASE"
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
