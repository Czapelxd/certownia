name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to a commit SHA (a moved tag = silent code change).
      # Dependabot (github-actions) keeps these SHAs and the version comments current.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail on known vulnerabilities in SHIPPED (production) dependencies only.
      # Dev-toolchain advisories are handled via Dependabot, not this gate.
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
