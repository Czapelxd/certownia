<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict Content-Security-Policy. GitHub Pages can't set HTTP headers, so we
      ship it as a meta tag. connect-src is the exact egress allowlist: Let's
      Encrypt (prod + staging), the two DoH resolvers, and the http-01 relay —
      nothing else. This is the main thing that stops an injected/tampered script
      from exfiltrating a key. style-src needs 'unsafe-inline' only for inline
      style="" attributes (no inline <script> exists, so script-src stays tight).
      NOTE: if you build with an ABSOLUTE-origin VITE_ACME_PROXY, add its origin
      to connect-src. frame-ancestors is ignored in a meta tag (needs a header).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://acme-v02.api.letsencrypt.org https://acme-staging-v02.api.letsencrypt.org https://cloudflare-dns.com https://dns.google https://api.allorigins.win; base-uri 'none'; form-action 'none'; object-src 'none'; frame-ancestors 'none'"
    />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Certownia — darmowy certyfikat SSL w przeglądarce</title>
    <meta
      name="description"
      content="Wygeneruj darmowy, zaufany certyfikat SSL dla swojej domeny prosto w przeglądarce. Klucz prywatny nigdy nie opuszcza Twojego komputera. Napędzane przez Let's Encrypt."
    />
    <meta name="theme-color" content="#f4efe6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1b2b" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Certownia — darmowy certyfikat SSL" />
    <meta
      property="og:description"
      content="Darmowy certyfikat SSL prosto w przeglądarce. Twój klucz prywatny nigdy nie opuszcza tego komputera."
    />
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="/fonts/fonts.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>
    <div id="root"></div>
    <noscript>
      <p style="padding: 2rem; font-family: sans-serif; color: #e6edf3">
        Certownia działa w całości w Twojej przeglądarce i wymaga włączonego
        JavaScriptu. — Certownia runs entirely in your browser and needs
        JavaScript enabled.
      </p>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
